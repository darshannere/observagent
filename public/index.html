<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObservAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      height: 100vh;
      background: var(--border);
    }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .log-row {
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 4px;
      display: flex;
      gap: 8px;
      border-radius: 2px;
      white-space: nowrap;
      overflow: hidden;
      border-left: 3px solid transparent;
    }

    .log-row.error {
      background: rgba(248, 81, 73, 0.12);
      border-left-color: var(--red);
    }

    .log-row.in-progress {
      opacity: 0.8;
    }

    .tool-name {
      color: var(--text);
      min-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ts {
      color: var(--text-muted);
      font-size: 11px;
    }

    .duration {
      color: var(--text-muted);
      margin-left: auto;
    }

    .duration.green {
      color: var(--green);
    }

    .duration.yellow {
      color: var(--yellow);
    }

    .duration.red {
      color: var(--red);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .in-progress .duration {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .agent-section {
      margin-bottom: 8px;
    }

    .agent-section summary {
      cursor: pointer;
      padding: 4px;
      font-size: 11px;
      color: var(--text-muted);
      user-select: none;
      list-style: none;
      font-family: var(--mono);
    }

    .agent-section summary::before {
      content: '\25B6 ';
      font-size: 9px;
    }

    details[open] > summary::before {
      content: '\25BC ';
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
      gap: 6px;
      height: 100%;
    }

    .placeholder .phase-label {
      font-size: 11px;
      opacity: 0.6;
    }

    /* ── Cost Panel ─────────────────────────────────────────────── */
    #cost-alert {
      display: none;
      background: rgba(248,81,73,0.12);
      border-bottom: 1px solid var(--red);
      padding: 6px 10px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--red);
      line-height: 1.4;
    }
    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2px 0;
    }
    .cost-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cost-value {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text);
      font-weight: 500;
    }
    .token-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 8px;
      margin: 6px 0;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
    }
    .token-grid span { color: var(--text); }
    .ctx-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    .progress-track {
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 3px 0 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
    .progress-fill.warning { background: var(--yellow); }
    .progress-fill.danger  { background: var(--red); }
    .model-breakdown {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      margin: 4px 0 6px;
      line-height: 1.6;
    }
    .model-breakdown .model-name { color: var(--text); }
    .threshold-section {
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .threshold-section label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .threshold-section input[type="number"] {
      width: 70px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 4px;
    }
    .threshold-section input[type="number"]:focus {
      outline: none;
      border-color: var(--green);
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <div class="panel" id="panel-log">
      <div class="panel-header">Tool Call Log</div>
      <div class="panel-body" id="tool-log"></div>
    </div>
    <div class="panel">
      <div class="panel-header">Agent Tree</div>
      <div class="panel-body">
        <div class="placeholder">
          <span>Agent Tree</span>
          <span class="phase-label">Available in Phase 4</span>
        </div>
      </div>
    </div>
    <!-- Cost & Tokens Panel -->
    <div class="panel" id="cost-panel">
      <!-- Alert banner: hidden until threshold exceeded. Stays visible, does not auto-dismiss. -->
      <div id="cost-alert"></div>

      <div class="panel-header">Cost &amp; Tokens</div>
      <div class="panel-body" style="padding:8px 10px;">

        <!-- Session cost total -->
        <div class="cost-row">
          <span class="cost-label">Session</span>
          <span id="session-cost" class="cost-value">$0.000000</span>
        </div>
        <!-- Today's total across all sessions -->
        <div class="cost-row">
          <span class="cost-label">Today</span>
          <span id="today-cost" class="cost-value">$0.000000</span>
        </div>

        <!-- Token breakdown: all four types per locked decision -->
        <div class="token-grid">
          <div>In: <span id="tok-input">0</span></div>
          <div>Out: <span id="tok-output">0</span></div>
          <div>Cache&#8593;: <span id="tok-cache-write">0</span></div>
          <div>Cache&#8595;: <span id="tok-cache-read">0</span></div>
        </div>

        <!-- Context window fill progress bar -->
        <div class="ctx-label">
          <span>Context</span>
          <span id="ctx-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="ctx-bar" class="progress-fill"></div>
        </div>

        <!-- Model breakdown: shows each model with its token totals -->
        <div class="model-breakdown" id="model-breakdown"></div>

        <!-- User-configurable thresholds — no defaults, no false alarms -->
        <div class="threshold-section">
          <label>
            Budget ($)
            <input type="number" id="budget-input" step="0.01" min="0" placeholder="—">
          </label>
          <label>
            Ctx alert (%)
            <input type="number" id="ctx-threshold-input" step="1" min="1" max="100" placeholder="—">
          </label>
        </div>

      </div>
    </div>
    <div class="panel">
      <div class="panel-header">Health</div>
      <div class="panel-body">
        <div class="placeholder">
          <span>Health Indicators</span>
          <span class="phase-label">Available in Phase 4</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- State ---
    const agentSections = new Map();   // session_id -> container element (div inside details)
    const inProgressTimers = new Map(); // tool_call_id -> { intervalId, killTimer, row, durEl }

    // --- Helpers ---
    function formatTs(tsMs) {
      return new Date(tsMs).toLocaleTimeString('en-US', { hour12: false });
    }

    function formatDuration(ms) {
      if (ms === null || ms === undefined) return '\u2014';
      return ms < 1000 ? `${ms}ms` : `${(ms / 1000).toFixed(1)}s`;
    }

    function latencyClass(ms) {
      if (ms === null || ms === undefined) return '';
      if (ms < 500) return 'green';
      if (ms <= 2000) return 'yellow';
      return 'red';
    }

    // --- Auto-scroll ---
    const logContainer = document.getElementById('tool-log');
    let userScrolledUp = false;
    logContainer.addEventListener('scroll', () => {
      const atBottom = logContainer.scrollHeight - logContainer.scrollTop <= logContainer.clientHeight + 60;
      userScrolledUp = !atBottom;
    });

    function scrollToBottom() {
      if (!userScrolledUp) {
        requestAnimationFrame(() => { logContainer.scrollTop = logContainer.scrollHeight; });
      }
    }

    // --- Agent sections ---
    function getAgentSection(sessionId) {
      if (agentSections.has(sessionId)) return agentSections.get(sessionId);

      const details = document.createElement('details');
      details.open = true;
      details.className = 'agent-section';
      details.dataset.sessionId = sessionId;

      const summary = document.createElement('summary');
      summary.textContent = `Agent ${sessionId.slice(0, 8)}`;

      const container = document.createElement('div');
      details.appendChild(summary);
      details.appendChild(container);
      logContainer.appendChild(details);
      agentSections.set(sessionId, container);
      scrollToBottom();
      return container;
    }

    // --- Row creation ---
    function createRow(event) {
      const row = document.createElement('div');
      row.className = 'log-row';
      if (event.hook_type === 'PreToolUse') row.classList.add('in-progress');

      const toolEl = document.createElement('span');
      toolEl.className = 'tool-name';
      // Error rows: show "toolname — error" if exit_status is non-null non-zero
      const isError = event.exit_status !== null && event.exit_status !== undefined && event.exit_status !== 0;
      toolEl.textContent = isError ? `${event.tool_name} \u2014 error` : event.tool_name;
      if (isError) row.classList.add('error');

      const tsEl = document.createElement('span');
      tsEl.className = 'ts';
      tsEl.textContent = formatTs(event.timestamp);

      const durEl = document.createElement('span');
      durEl.className = `duration ${latencyClass(event.duration_ms)}`;
      durEl.textContent = event.duration_ms !== null ? formatDuration(event.duration_ms) : '\u2026';

      row.appendChild(toolEl);
      row.appendChild(tsEl);
      row.appendChild(durEl);
      return { row, durEl };
    }

    // --- Live event rendering ---
    function appendRow(event) {
      if (event.hook_type === 'PreToolUse') {
        const { row, durEl } = createRow(event);
        if (event.tool_call_id) {
          const startMs = event.timestamp;
          const intervalId = setInterval(() => {
            const elapsed = Date.now() - startMs;
            durEl.textContent = formatDuration(elapsed) + '\u2026';
            durEl.className = 'duration'; // no color while in progress
          }, 100);
          // Cleanup orphaned timers after 60s (stuck tool protection)
          const killTimer = setTimeout(() => {
            if (inProgressTimers.has(event.tool_call_id)) {
              clearInterval(intervalId);
              inProgressTimers.delete(event.tool_call_id);
              durEl.textContent = '60s+ (stuck)';
              durEl.className = 'duration red';
              row.classList.remove('in-progress');
            }
          }, 60_000);
          inProgressTimers.set(event.tool_call_id, { intervalId, killTimer, row, durEl });
        }
        getAgentSection(event.session_id).appendChild(row);
        scrollToBottom();

      } else if (event.hook_type === 'PostToolUse') {
        if (event.tool_call_id && inProgressTimers.has(event.tool_call_id)) {
          // Update existing in-progress row in-place
          const pending = inProgressTimers.get(event.tool_call_id);
          clearInterval(pending.intervalId);
          clearTimeout(pending.killTimer);
          inProgressTimers.delete(event.tool_call_id);

          pending.durEl.textContent = formatDuration(event.duration_ms);
          pending.durEl.className = `duration ${latencyClass(event.duration_ms)}`;
          pending.row.classList.remove('in-progress');

          const isError = event.exit_status !== null && event.exit_status !== undefined && event.exit_status !== 0;
          if (isError) {
            pending.row.classList.add('error');
            pending.row.querySelector('.tool-name').textContent = `${event.tool_name} \u2014 error`;
            showToast(`${event.tool_name} failed`);
          }
        } else {
          // No matching PreToolUse row (pre-existing event or server restart) — render standalone
          const { row } = createRow(event);
          getAgentSection(event.session_id).appendChild(row);
          scrollToBottom();
        }
      }
    }

    // --- Historical hydration (no timers — duration already known) ---
    function renderHistoricalRow(event) {
      // For history, skip standalone PreToolUse rows that have a matching PostToolUse
      // Simple approach: render all rows as final (no timers)
      const { row } = createRow(event);
      getAgentSection(event.session_id).appendChild(row);
    }

    async function hydrate() {
      try {
        const res = await fetch('/api/events');
        if (!res.ok) return;
        const events = await res.json();
        // stmtAll returns DESC; reverse to chronological for display
        const ordered = events.slice().reverse();
        for (const e of ordered) {
          renderHistoricalRow(e);
        }
        scrollToBottom();
      } catch (e) {
        console.warn('[hydrate] failed:', e.message);
      }
    }

    // --- SSE subscription ---
    function subscribeSSE() {
      const es = new EventSource('/events');
      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'connected') return; // skip initial handshake
        if (msg.type === 'cost_update') { handleCostUpdate(msg); return; }
        appendRow(msg);
      };
      es.onerror = () => {
        console.warn('[sse] connection lost \u2014 browser will auto-reconnect');
      };
    }

    // --- Toast notifications ---
    let toastContainer = null;
    function ensureToastContainer() {
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.style.cssText = 'position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;';
        document.body.appendChild(toastContainer);
      }
      return toastContainer;
    }

    function showToast(message) {
      const container = ensureToastContainer();
      const toast = document.createElement('div');
      toast.style.cssText = [
        'background:#1f1f1f',
        'border:1px solid var(--red)',
        'color:var(--text)',
        'padding:10px 14px',
        'border-radius:6px',
        'font-size:12px',
        'font-family:var(--mono)',
        'opacity:0',
        'transition:opacity 0.2s',
        'max-width:280px',
        'word-break:break-word'
      ].join(';');
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.style.opacity = '1'; });
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
      }, 5000);
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', async () => {
      await hydrate();
      subscribeSSE();
    });

    // ── Cost Panel ──────────────────────────────────────────────────
    // State
    let costState = {
      sessions: [],
      todayTotal: 0,
      contextFillPct: 0,
      thresholds: { budget_threshold_usd: null, ctx_fill_threshold_pct: null }
    };

    // Format cost: always 6 decimal places, $ prefix, no label
    function formatCost(usd) {
      return '$' + Number(usd || 0).toFixed(6);
    }

    // Format token count with K/M suffix for readability
    function formatTokens(n) {
      n = n || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000)    return (n / 1000).toFixed(0) + 'K';
      return String(n);
    }

    // Find the most recently active session (sorted by updated_at DESC from /api/cost)
    function getActiveSession(sessions) {
      if (!sessions.length) return null;
      return sessions[0];
    }

    // Render cost panel from costState
    function renderCostPanel() {
      const active = getActiveSession(costState.sessions);

      // Session cost
      document.getElementById('session-cost').textContent = active
        ? formatCost(active.total_cost_usd)
        : '$0.000000';

      // Today's total
      document.getElementById('today-cost').textContent = formatCost(costState.todayTotal);

      // Token breakdown from active session
      const tokIn  = active ? (active.input_tokens      || 0) : 0;
      const tokOut = active ? (active.output_tokens     || 0) : 0;
      const tokCR  = active ? (active.cache_read_tokens || 0) : 0;
      const tokCW  = active ? ((active.cache_write_5m || 0) + (active.cache_write_1h || 0)) : 0;
      document.getElementById('tok-input').textContent       = formatTokens(tokIn);
      document.getElementById('tok-output').textContent      = formatTokens(tokOut);
      document.getElementById('tok-cache-read').textContent  = formatTokens(tokCR);
      document.getElementById('tok-cache-write').textContent = formatTokens(tokCW);

      // Context fill bar
      const pct = costState.contextFillPct || 0;
      document.getElementById('ctx-pct').textContent = pct + '%';
      const bar = document.getElementById('ctx-bar');
      bar.style.width = pct + '%';
      bar.className = 'progress-fill' +
        (pct >= 95 ? ' danger' : pct >= 80 ? ' warning' : '');

      // Model breakdown: group all sessions by model, sum cost
      const modelMap = {};
      for (const s of costState.sessions) {
        if (!s.model) continue;
        if (!modelMap[s.model]) modelMap[s.model] = { cost: 0, sessions: 0 };
        modelMap[s.model].cost += s.total_cost_usd || 0;
        modelMap[s.model].sessions++;
      }
      const breakdownEl = document.getElementById('model-breakdown');
      if (Object.keys(modelMap).length) {
        breakdownEl.innerHTML = Object.entries(modelMap)
          .sort((a, b) => b[1].cost - a[1].cost)
          .map(([model, d]) =>
            '<div><span class="model-name">' + model.replace('claude-', '') + '</span> \u2014 ' +
            formatCost(d.cost) + ' (' + d.sessions + ' session' + (d.sessions > 1 ? 's' : '') + ')</div>'
          ).join('');
      } else {
        breakdownEl.innerHTML = '<div style="color:var(--text-muted)">No sessions yet</div>';
      }

      // Alert banner
      renderAlertBanner(active);
    }

    function renderAlertBanner(activeSession) {
      const alertEl = document.getElementById('cost-alert');
      const { budget_threshold_usd, ctx_fill_threshold_pct } = costState.thresholds;
      const alerts = [];

      if (budget_threshold_usd !== null && activeSession) {
        if ((activeSession.total_cost_usd || 0) >= budget_threshold_usd) {
          alerts.push('Session cost ' + formatCost(activeSession.total_cost_usd) +
            ' exceeded budget $' + budget_threshold_usd.toFixed(2));
        }
      }
      if (ctx_fill_threshold_pct !== null) {
        const pct = costState.contextFillPct || 0;
        if (pct >= ctx_fill_threshold_pct) {
          alerts.push('Context ' + pct + '% \u2014 exceeded ' + ctx_fill_threshold_pct + '% threshold');
        }
      }

      if (alerts.length) {
        alertEl.textContent = alerts.join(' \u00B7 ');
        alertEl.style.display = 'block';
      } else {
        alertEl.style.display = 'none';
      }
    }

    // Hydrate cost panel on page load from /api/cost and /api/config
    async function hydrateCost() {
      try {
        const [costData, configData] = await Promise.all([
          fetch('/api/cost').then(r => r.json()),
          fetch('/api/config').then(r => r.json()),
        ]);
        costState.sessions   = costData.sessions  || [];
        costState.todayTotal = costData.todayTotal || 0;
        costState.thresholds = configData;
        renderCostPanel();

        // Populate threshold inputs with persisted values
        const bi = document.getElementById('budget-input');
        const ci = document.getElementById('ctx-threshold-input');
        if (configData.budget_threshold_usd !== null && configData.budget_threshold_usd !== undefined) {
          bi.value = configData.budget_threshold_usd;
        }
        if (configData.ctx_fill_threshold_pct !== null && configData.ctx_fill_threshold_pct !== undefined) {
          ci.value = configData.ctx_fill_threshold_pct;
        }
      } catch (e) {
        console.warn('[cost] hydration failed:', e.message);
      }
    }

    // Handle live cost_update SSE events
    function handleCostUpdate(msg) {
      // msg shape: { type, sessionId, cost, tokens, contextFillPct, model, ts }
      const idx = costState.sessions.findIndex(s => s.session_id === msg.sessionId);
      const updated = {
        session_id:        msg.sessionId,
        model:             msg.model,
        input_tokens:      msg.tokens.input,
        output_tokens:     msg.tokens.output,
        cache_read_tokens: msg.tokens.cacheRead,
        cache_write_5m:    msg.tokens.cacheWrite,
        cache_write_1h:    0,
        total_cost_usd:    msg.cost,
        last_event_ts:     new Date(msg.ts).toISOString(),
      };
      if (idx >= 0) {
        costState.sessions[idx] = updated;
      } else {
        costState.sessions.unshift(updated); // prepend — most recent first
      }
      costState.contextFillPct = msg.contextFillPct;
      renderCostPanel();
    }

    // Wire threshold inputs: POST to /api/config on change (debounced 600ms)
    function wireThresholdInputs() {
      let debounceTimer;
      function saveThresholds() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          const bi = document.getElementById('budget-input');
          const ci = document.getElementById('ctx-threshold-input');
          const body = {
            budget_threshold_usd:   bi.value ? parseFloat(bi.value)   : null,
            ctx_fill_threshold_pct: ci.value ? parseInt(ci.value, 10) : null,
          };
          costState.thresholds = {
            budget_threshold_usd:   body.budget_threshold_usd,
            ctx_fill_threshold_pct: body.ctx_fill_threshold_pct,
          };
          try {
            await fetch('/api/config', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(body),
            });
          } catch (e) {
            console.warn('[cost] config save failed:', e.message);
          }
          renderAlertBanner(getActiveSession(costState.sessions));
        }, 600);
      }
      document.getElementById('budget-input').addEventListener('input', saveThresholds);
      document.getElementById('ctx-threshold-input').addEventListener('input', saveThresholds);
    }

    // Cost panel initialization
    document.addEventListener('DOMContentLoaded', () => {
      hydrateCost();
      wireThresholdInputs();
    });
