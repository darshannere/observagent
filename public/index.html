<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ObservAgent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 240px 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 1px;
      height: 100vh;
      background: var(--border);
    }

    #panel-agents {
      grid-row: 1 / -1; /* spans both rows */
    }

    #panel-log {
      grid-row: 1 / -1; /* spans both rows */
    }

    .panel {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 8px 12px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .log-row {
      font-family: var(--mono);
      font-size: 12px;
      padding: 2px 4px;
      display: flex;
      gap: 8px;
      border-radius: 2px;
      white-space: nowrap;
      overflow: hidden;
      border-left: 3px solid transparent;
    }

    .log-row.error {
      background: rgba(248, 81, 73, 0.12);
      border-left-color: var(--red);
    }

    .log-row.in-progress {
      opacity: 0.8;
    }

    .tool-name {
      color: var(--text);
      min-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ts {
      color: var(--text-muted);
      font-size: 11px;
    }

    .duration {
      color: var(--text-muted);
      margin-left: auto;
    }

    .duration.green {
      color: var(--green);
    }

    .duration.yellow {
      color: var(--yellow);
    }

    .duration.red {
      color: var(--red);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .in-progress .duration {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .agent-section {
      margin-bottom: 8px;
    }

    .agent-section summary {
      cursor: pointer;
      padding: 4px;
      font-size: 11px;
      color: var(--text-muted);
      user-select: none;
      list-style: none;
      font-family: var(--mono);
    }

    .agent-section summary::before {
      content: '\25B6 ';
      font-size: 9px;
    }

    details[open] > summary::before {
      content: '\25BC ';
    }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 13px;
      gap: 6px;
      height: 100%;
    }

    .placeholder .phase-label {
      font-size: 11px;
      opacity: 0.6;
    }

    /* ── Cost Panel ─────────────────────────────────────────────── */
    #cost-alert {
      display: none;
      background: rgba(248,81,73,0.12);
      border-bottom: 1px solid var(--red);
      padding: 6px 10px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--red);
      line-height: 1.4;
    }
    .cost-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2px 0;
    }
    .cost-label {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .cost-value {
      font-size: 13px;
      font-family: var(--mono);
      color: var(--text);
      font-weight: 500;
    }
    .token-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px 8px;
      margin: 6px 0;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
    }
    .token-grid span { color: var(--text); }
    .ctx-label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-muted);
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
    }
    .progress-track {
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      margin: 3px 0 8px;
    }
    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 4px;
      transition: width 0.3s ease, background 0.3s ease;
      width: 0%;
    }
    .progress-fill.warning { background: var(--yellow); }
    .progress-fill.danger  { background: var(--red); }
    .model-breakdown {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      margin: 4px 0 6px;
      line-height: 1.6;
    }
    .model-breakdown .model-name { color: var(--text); }
    .threshold-section {
      border-top: 1px solid var(--border);
      padding-top: 8px;
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .threshold-section label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .threshold-section input[type="number"] {
      width: 70px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 4px;
    }
    .threshold-section input[type="number"]:focus {
      outline: none;
      border-color: var(--green);
    }

    /* ── Agent Tree Panel ─────────────────────────────────── */
    #agent-tree-body {
      padding: 4px 0;
    }

    .agent-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 8px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      border-left: 3px solid transparent;
      user-select: none;
    }
    .agent-row:hover { background: rgba(255,255,255,0.04); }
    .agent-row.selected {
      background: rgba(255,255,255,0.07);
      border-left-color: var(--green);
    }
    .agent-row.depth-0 {
      font-weight: 500;
      padding-left: 8px;
    }
    .agent-row.depth-1 {
      padding-left: 22px; /* indent child rows */
    }

    /* Lifecycle state indicators */
    .agent-indicator {
      font-size: 8px;
      flex-shrink: 0;
    }
    .agent-row.state-active  .agent-indicator { color: var(--green); }
    .agent-row.state-completed { opacity: 0.55; }
    .agent-row.state-errored .agent-indicator { color: var(--red); }

    /* Stuck state */
    .agent-row.stuck {
      background: rgba(210, 153, 34, 0.10);
      border-left-color: var(--yellow);
    }
    .agent-row.stuck .agent-label { color: var(--yellow); }
    .agent-idle {
      font-size: 10px;
      color: var(--yellow);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Label and cost */
    .agent-label {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .agent-cost {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      font-family: var(--mono);
    }
    .agent-row.top-spender .agent-cost {
      color: var(--yellow);
      font-weight: 600;
    }

    /* Spawn highlight — brief flash then fades */
    @keyframes agentSpawn {
      0%   { background: rgba(63, 185, 80, 0.20); }
      100% { background: transparent; }
    }
    .agent-row.just-spawned {
      animation: agentSpawn 1.2s ease-out forwards;
    }

    /* ── Health Panel Cards ───────────────────────────────────── */
    .health-cards {
      display: flex;
      gap: 8px;
      padding: 8px;
      height: 100%;
      align-items: flex-start;
    }
    .health-card {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-top: 3px solid var(--border);
      border-radius: 4px;
      padding: 10px 8px 8px;
      text-align: center;
      min-width: 0;
    }
    .health-card.status-green  { border-top-color: var(--green); }
    .health-card.status-yellow { border-top-color: var(--yellow); }
    .health-card.status-red    { border-top-color: var(--red); }
    .hcard-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }
    .hcard-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    /* ── Timeline Tab Buttons and Tooltip ────────────────────── */
    .tab-btn {
      padding: 8px 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      flex-shrink: 0;
      font-family: sans-serif;
    }
    .tab-btn.active {
      border-bottom-color: var(--green);
      color: var(--text);
    }
    #timeline-tooltip {
      position: fixed;
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 11px;
      font-family: var(--mono);
      pointer-events: none;
      z-index: 200;
      max-width: 240px;
    }
    .tip-tool     { color: var(--text); font-weight: 500; margin-bottom: 2px; }
    .tip-target   { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tip-dur      { color: var(--text-muted); margin-top: 2px; }
    .tip-success  { color: var(--green); }
    .tip-error    { color: var(--red); }
    .tip-in-progress { color: var(--yellow); }
  </style>
</head>
<body>
  <div id="replay-banner" style="display:none; position:sticky; top:0; z-index:100;
    background:var(--accent-amber,#d29922); color:#000; padding:10px 16px;
    align-items:center; gap:12px; font-size:13px; font-weight:500;">
    <span id="replay-label">Viewing session</span>
    <div style="margin-left:auto; display:flex; gap:8px;">
      <button id="btn-export-jsonl" style="padding:4px 10px; border-radius:4px;
        background:#000; color:#fff; border:none; cursor:pointer; font-size:12px;">
        Export JSONL
      </button>
      <button id="btn-export-csv" style="padding:4px 10px; border-radius:4px;
        background:#000; color:#fff; border:none; cursor:pointer; font-size:12px;">
        Export CSV
      </button>
      <a href="/history" style="padding:4px 10px; border-radius:4px;
        background:rgba(0,0,0,0.15); color:#000; text-decoration:none; font-size:12px;
        display:inline-flex; align-items:center;">
        Back to History
      </a>
    </div>
  </div>
  <div class="dashboard">
    <!-- Column 1, rows 1+2: Agent Tree (spans full height) -->
    <div class="panel" id="panel-agents">
      <div class="panel-header">Agent Tree</div>
      <div class="panel-body" id="agent-tree-body"></div>
    </div>

    <!-- Column 2, rows 1+2: Tool Log / Timeline (tabbed, spans full height) -->
    <div class="panel" id="panel-log">
      <div class="panel-header" style="display:flex; align-items:center; gap:0; padding:0; overflow:hidden; flex-shrink:0;">
        <button class="tab-btn active" id="tab-log">Tool Log</button>
        <button class="tab-btn" id="tab-timeline">Timeline</button>
        <span id="log-filter-badge" style="display:none;font-size:10px;color:var(--green);margin-left:8px;"></span>
      </div>
      <div class="panel-body" id="tool-log"></div>
      <div id="tab-body-timeline" style="display:none; flex:1; overflow:hidden; position:relative; min-height:0;">
        <canvas id="timeline-canvas" style="display:block;"></canvas>
      </div>
    </div>

    <!-- Column 3, row 1: Cost & Tokens Panel -->
    <div class="panel" id="cost-panel">
      <!-- Alert banner: hidden until threshold exceeded. Stays visible, does not auto-dismiss. -->
      <div id="cost-alert"></div>

      <div class="panel-header">Cost &amp; Tokens</div>
      <div class="panel-body" style="padding:8px 10px;">

        <!-- Session cost total -->
        <div class="cost-row">
          <span class="cost-label">Session</span>
          <span id="session-cost" class="cost-value">$0.000000</span>
        </div>
        <!-- Today's total across all sessions -->
        <div class="cost-row">
          <span class="cost-label">Today</span>
          <span id="today-cost" class="cost-value">$0.000000</span>
        </div>

        <!-- Token breakdown: all four types per locked decision -->
        <div class="token-grid">
          <div>In: <span id="tok-input">0</span></div>
          <div>Out: <span id="tok-output">0</span></div>
          <div>Cache&#8593;: <span id="tok-cache-write">0</span></div>
          <div>Cache&#8595;: <span id="tok-cache-read">0</span></div>
        </div>

        <!-- Context window fill progress bar -->
        <div class="ctx-label">
          <span>Context</span>
          <span id="ctx-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="ctx-bar" class="progress-fill"></div>
        </div>

        <!-- Model breakdown: shows each model with its token totals -->
        <div class="model-breakdown" id="model-breakdown"></div>

        <!-- User-configurable thresholds — no defaults, no false alarms -->
        <div class="threshold-section">
          <label>
            Budget ($)
            <input type="number" id="budget-input" step="0.01" min="0" placeholder="—">
          </label>
          <label>
            Ctx alert (%)
            <input type="number" id="ctx-threshold-input" step="1" min="1" max="100" placeholder="—">
          </label>
        </div>

      </div>
    </div>
    <!-- Column 3, row 2: Health Panel (live) -->
    <div class="panel" id="health-panel">
      <div class="panel-header">Health</div>
      <div class="panel-body" id="health-panel-body" style="padding:0;">
        <div class="health-cards">
          <div class="health-card" id="hcard-hook">
            <div class="hcard-value" id="hcard-hook-value">--</div>
            <div class="hcard-label">Hooks</div>
          </div>
          <div class="health-card" id="hcard-error">
            <div class="hcard-value" id="hcard-error-value">--%</div>
            <div class="hcard-label">Error Rate</div>
          </div>
          <div class="health-card" id="hcard-uptime">
            <div class="hcard-value" id="hcard-uptime-value">--</div>
            <div class="hcard-label">Uptime</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="timeline-tooltip">
    <div class="tip-tool" id="tip-tool"></div>
    <div class="tip-target" id="tip-target"></div>
    <div class="tip-dur" id="tip-dur"></div>
    <div class="tip-status" id="tip-status"></div>
  </div>

  <script>
    // --- Replay mode detection ---
    const urlParams = new URLSearchParams(window.location.search);
    const REPLAY_SESSION_ID = urlParams.get('session_id');
    const IS_REPLAY = !!REPLAY_SESSION_ID;

    // --- State ---
    const agentSections = new Map();   // session_id -> container element (div inside details)
    const inProgressTimers = new Map(); // tool_call_id -> { intervalId, killTimer, row, durEl }

    // --- Helpers ---
    function formatTs(tsMs) {
      return new Date(tsMs).toLocaleTimeString('en-US', { hour12: false });
    }

    function formatDuration(ms) {
      if (ms === null || ms === undefined) return '\u2014';
      return ms < 1000 ? `${ms}ms` : `${(ms / 1000).toFixed(1)}s`;
    }

    function latencyClass(ms) {
      if (ms === null || ms === undefined) return '';
      if (ms < 500) return 'green';
      if (ms <= 2000) return 'yellow';
      return 'red';
    }

    // --- Auto-scroll ---
    const logContainer = document.getElementById('tool-log');
    let userScrolledUp = false;
    logContainer.addEventListener('scroll', () => {
      const atBottom = logContainer.scrollHeight - logContainer.scrollTop <= logContainer.clientHeight + 60;
      userScrolledUp = !atBottom;
    });

    function scrollToBottom() {
      if (!userScrolledUp) {
        requestAnimationFrame(() => { logContainer.scrollTop = logContainer.scrollHeight; });
      }
    }

    // --- Agent sections ---
    function getAgentSection(sessionId) {
      if (agentSections.has(sessionId)) return agentSections.get(sessionId);

      const details = document.createElement('details');
      details.open = true;
      details.className = 'agent-section';
      details.dataset.sessionId = sessionId;

      const summary = document.createElement('summary');
      summary.textContent = `Agent ${sessionId.slice(0, 8)}`;

      const container = document.createElement('div');
      details.appendChild(summary);
      details.appendChild(container);
      logContainer.appendChild(details);
      agentSections.set(sessionId, container);
      scrollToBottom();
      return container;
    }

    // --- Row creation ---
    function createRow(event) {
      const row = document.createElement('div');
      row.className = 'log-row';
      if (event.hook_type === 'PreToolUse') row.classList.add('in-progress');

      const toolEl = document.createElement('span');
      toolEl.className = 'tool-name';
      // Error rows: show "toolname — error" if exit_status is non-null non-zero
      const isError = event.exit_status !== null && event.exit_status !== undefined && event.exit_status !== 0;
      toolEl.textContent = isError ? `${event.tool_name} \u2014 error` : event.tool_name;
      if (isError) row.classList.add('error');

      const tsEl = document.createElement('span');
      tsEl.className = 'ts';
      tsEl.textContent = formatTs(event.timestamp);

      const durEl = document.createElement('span');
      durEl.className = `duration ${latencyClass(event.duration_ms)}`;
      durEl.textContent = event.duration_ms !== null ? formatDuration(event.duration_ms) : '\u2026';

      row.appendChild(toolEl);
      row.appendChild(tsEl);
      row.appendChild(durEl);
      return { row, durEl };
    }

    // --- Live event rendering ---
    function appendRow(event) {
      if (event.hook_type === 'PreToolUse') {
        const { row, durEl } = createRow(event);
        if (event.tool_call_id) {
          const startMs = event.timestamp;
          const intervalId = setInterval(() => {
            const elapsed = Date.now() - startMs;
            durEl.textContent = formatDuration(elapsed) + '\u2026';
            durEl.className = 'duration'; // no color while in progress
          }, 100);
          // Cleanup orphaned timers after 60s (stuck tool protection)
          const killTimer = setTimeout(() => {
            if (inProgressTimers.has(event.tool_call_id)) {
              clearInterval(intervalId);
              inProgressTimers.delete(event.tool_call_id);
              durEl.textContent = '60s+ (stuck)';
              durEl.className = 'duration red';
              row.classList.remove('in-progress');
            }
          }, 60_000);
          inProgressTimers.set(event.tool_call_id, { intervalId, killTimer, row, durEl });
        }
        getAgentSection(event.session_id).appendChild(row);
        scrollToBottom();

      } else if (event.hook_type === 'PostToolUse') {
        if (event.tool_call_id && inProgressTimers.has(event.tool_call_id)) {
          // Update existing in-progress row in-place
          const pending = inProgressTimers.get(event.tool_call_id);
          clearInterval(pending.intervalId);
          clearTimeout(pending.killTimer);
          inProgressTimers.delete(event.tool_call_id);

          pending.durEl.textContent = formatDuration(event.duration_ms);
          pending.durEl.className = `duration ${latencyClass(event.duration_ms)}`;
          pending.row.classList.remove('in-progress');

          const isError = event.exit_status !== null && event.exit_status !== undefined && event.exit_status !== 0;
          if (isError) {
            pending.row.classList.add('error');
            pending.row.querySelector('.tool-name').textContent = `${event.tool_name} \u2014 error`;
            showToast(`${event.tool_name} failed`);
          }
        } else {
          // No matching PreToolUse row (pre-existing event or server restart) — render standalone
          const { row } = createRow(event);
          getAgentSection(event.session_id).appendChild(row);
          scrollToBottom();
        }
      }
    }

    // --- Historical hydration (no timers — duration already known) ---
    function renderHistoricalRow(event) {
      // For history, skip standalone PreToolUse rows that have a matching PostToolUse
      // Simple approach: render all rows as final (no timers)
      const { row } = createRow(event);
      getAgentSection(event.session_id).appendChild(row);
    }

    async function hydrate() {
      try {
        const eventsUrl = IS_REPLAY ? '/api/events?session_id=' + REPLAY_SESSION_ID : '/api/events';
        const res = await fetch(eventsUrl);
        if (!res.ok) return;
        const events = await res.json();
        // stmtAll returns DESC; reverse to chronological for display
        const ordered = events.slice().reverse();
        // Reset timeline state before populating from history
        resetTimelineState();
        for (const e of ordered) {
          renderHistoricalRow(e);
          // Populate timeline state from historical events
          if (e.hook_type === 'PreToolUse') timelineAddPreToolUse(e);
          else if (e.hook_type === 'PostToolUse') timelineAddPostToolUse(e);
        }
        scrollToBottom();
        // Static render after hydration (no animation loop in IS_REPLAY; live mode starts loop if needed)
        renderTimeline();
        if (!IS_REPLAY && timelineState.inProgressCount > 0) startTimelineLoop();
      } catch (e) {
        console.warn('[hydrate] failed:', e.message);
      }
    }

    // --- SSE subscription ---
    function subscribeSSE() {
      const es = new EventSource('/events');
      es.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'connected') return; // skip initial handshake
        if (msg.type === 'cost_update') { handleCostUpdate(msg); return; }
        appendRow(msg);
        // Timeline wiring (additive — does not modify appendRow behavior)
        if (msg.hook_type === 'PreToolUse') {
          timelineAddPreToolUse(msg);
          if (timelineState.inProgressCount > 0 && _tlAnimId === null) startTimelineLoop();
        } else if (msg.hook_type === 'PostToolUse') {
          timelineAddPostToolUse(msg);
          if (timelineState.inProgressCount === 0) {
            renderTimeline(); // final static render when all calls complete
          }
        }
      };
      es.onerror = () => {
        console.warn('[sse] connection lost \u2014 browser will auto-reconnect');
      };
    }

    // --- Toast notifications ---
    let toastContainer = null;
    function ensureToastContainer() {
      if (!toastContainer) {
        toastContainer = document.createElement('div');
        toastContainer.style.cssText = 'position:fixed;bottom:16px;right:16px;display:flex;flex-direction:column;gap:8px;z-index:9999;';
        document.body.appendChild(toastContainer);
      }
      return toastContainer;
    }

    function showToast(message) {
      const container = ensureToastContainer();
      const toast = document.createElement('div');
      toast.style.cssText = [
        'background:#1f1f1f',
        'border:1px solid var(--red)',
        'color:var(--text)',
        'padding:10px 14px',
        'border-radius:6px',
        'font-size:12px',
        'font-family:var(--mono)',
        'opacity:0',
        'transition:opacity 0.2s',
        'max-width:280px',
        'word-break:break-word'
      ].join(';');
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.style.opacity = '1'; });
      setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 200);
      }, 5000);
    }

    // --- Export helpers ---
    function toCsvRow(values) {
      return values.map(v => {
        const s = (v === null || v === undefined) ? '' : String(v);
        return (s.includes(',') || s.includes('"') || s.includes('\n'))
          ? '"' + s.replace(/"/g, '""') + '"' : s;
      }).join(',');
    }

    function triggerDownload(content, filename, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function exportSession(sessionId, format) {
      const data = await fetch('/api/sessions/' + sessionId + '/export').then(r => r.json());
      const { session, events } = data;
      const project = (session && session.project_name) || 'unknown';
      const date = ((session && session.last_event_ts) || '').slice(0, 10) || new Date().toISOString().slice(0, 10);
      const safeName = project.replace(/[^a-zA-Z0-9_-]/g, '_');
      const filename = 'observagent_' + safeName + '_' + date + '.' + format;

      if (format === 'jsonl') {
        const content = events.map(e => JSON.stringify(Object.assign({ session_id: sessionId, project_name: project }, e))).join('\n');
        triggerDownload(content, filename, 'application/jsonl');
      } else {
        const headers = ['session_id', 'project_name', 'tool_name', 'timestamp', 'duration_ms', 'exit_status'];
        const rows = events.map(e => [sessionId, project, e.tool_name, e.timestamp, e.duration_ms, e.exit_status]);
        const content = [headers, ...rows].map(toCsvRow).join('\n');
        triggerDownload(content, filename, 'text/csv');
      }
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', async () => {
      await hydrate();
      if (!IS_REPLAY) {
        subscribeSSE();
      }

      if (IS_REPLAY) {
        // Show replay banner
        const banner = document.getElementById('replay-banner');
        if (banner) banner.style.display = 'flex';
        const label = document.getElementById('replay-label');
        if (label) label.textContent = 'Viewing session: ' + REPLAY_SESSION_ID;

        // Wire export buttons
        const btnJsonl = document.getElementById('btn-export-jsonl');
        const btnCsv = document.getElementById('btn-export-csv');
        if (btnJsonl) btnJsonl.addEventListener('click', () => exportSession(REPLAY_SESSION_ID, 'jsonl'));
        if (btnCsv) btnCsv.addEventListener('click', () => exportSession(REPLAY_SESSION_ID, 'csv'));
      }
    });

    // ── Cost Panel ──────────────────────────────────────────────────
    // State
    let costState = {
      sessions: [],
      todayTotal: 0,
      contextFillPct: 0,
      thresholds: { budget_threshold_usd: null, ctx_fill_threshold_pct: null }
    };

    // Format cost: always 6 decimal places, $ prefix, no label
    function formatCost(usd) {
      return '$' + Number(usd || 0).toFixed(6);
    }

    // Format token count with K/M suffix for readability
    function formatTokens(n) {
      n = n || 0;
      if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
      if (n >= 1000)    return (n / 1000).toFixed(0) + 'K';
      return String(n);
    }

    // Find the most recently active session (sorted by updated_at DESC from /api/cost)
    function getActiveSession(sessions) {
      if (!sessions.length) return null;
      return sessions[0];
    }

    // Render cost panel from costState
    function renderCostPanel() {
      const active = getActiveSession(costState.sessions);

      // Session cost
      document.getElementById('session-cost').textContent = active
        ? formatCost(active.total_cost_usd)
        : '$0.000000';

      // Today's total
      document.getElementById('today-cost').textContent = formatCost(costState.todayTotal);

      // Token breakdown from active session
      const tokIn  = active ? (active.input_tokens      || 0) : 0;
      const tokOut = active ? (active.output_tokens     || 0) : 0;
      const tokCR  = active ? (active.cache_read_tokens || 0) : 0;
      const tokCW  = active ? ((active.cache_write_5m || 0) + (active.cache_write_1h || 0)) : 0;
      document.getElementById('tok-input').textContent       = formatTokens(tokIn);
      document.getElementById('tok-output').textContent      = formatTokens(tokOut);
      document.getElementById('tok-cache-read').textContent  = formatTokens(tokCR);
      document.getElementById('tok-cache-write').textContent = formatTokens(tokCW);

      // Context fill bar
      const pct = costState.contextFillPct || 0;
      document.getElementById('ctx-pct').textContent = pct + '%';
      const bar = document.getElementById('ctx-bar');
      bar.style.width = pct + '%';
      bar.className = 'progress-fill' +
        (pct >= 95 ? ' danger' : pct >= 80 ? ' warning' : '');

      // Model breakdown: group all sessions by model, sum cost
      const modelMap = {};
      for (const s of costState.sessions) {
        if (!s.model) continue;
        if (!modelMap[s.model]) modelMap[s.model] = { cost: 0, sessions: 0 };
        modelMap[s.model].cost += s.total_cost_usd || 0;
        modelMap[s.model].sessions++;
      }
      const breakdownEl = document.getElementById('model-breakdown');
      if (Object.keys(modelMap).length) {
        breakdownEl.innerHTML = Object.entries(modelMap)
          .sort((a, b) => b[1].cost - a[1].cost)
          .map(([model, d]) =>
            '<div><span class="model-name">' + model.replace('claude-', '') + '</span> \u2014 ' +
            formatCost(d.cost) + ' (' + d.sessions + ' session' + (d.sessions > 1 ? 's' : '') + ')</div>'
          ).join('');
      } else {
        breakdownEl.innerHTML = '<div style="color:var(--text-muted)">No sessions yet</div>';
      }

      // Alert banner
      renderAlertBanner(active);
    }

    function renderAlertBanner(activeSession) {
      const alertEl = document.getElementById('cost-alert');
      const { budget_threshold_usd, ctx_fill_threshold_pct } = costState.thresholds;
      const alerts = [];

      if (budget_threshold_usd !== null && activeSession) {
        if ((activeSession.total_cost_usd || 0) >= budget_threshold_usd) {
          alerts.push('Session cost ' + formatCost(activeSession.total_cost_usd) +
            ' exceeded budget $' + budget_threshold_usd.toFixed(2));
        }
      }
      if (ctx_fill_threshold_pct !== null) {
        const pct = costState.contextFillPct || 0;
        if (pct >= ctx_fill_threshold_pct) {
          alerts.push('Context ' + pct + '% \u2014 exceeded ' + ctx_fill_threshold_pct + '% threshold');
        }
      }

      if (alerts.length) {
        alertEl.textContent = alerts.join(' \u00B7 ');
        alertEl.style.display = 'block';
      } else {
        alertEl.style.display = 'none';
      }
    }

    // Hydrate cost panel on page load from /api/cost and /api/config
    async function hydrateCost() {
      try {
        const [costData, configData] = await Promise.all([
          fetch('/api/cost').then(r => r.json()),
          fetch('/api/config').then(r => r.json()),
        ]);
        costState.sessions   = costData.sessions  || [];
        costState.todayTotal = costData.todayTotal || 0;
        costState.thresholds = configData;
        renderCostPanel();

        // Populate threshold inputs with persisted values
        const bi = document.getElementById('budget-input');
        const ci = document.getElementById('ctx-threshold-input');
        if (configData.budget_threshold_usd !== null && configData.budget_threshold_usd !== undefined) {
          bi.value = configData.budget_threshold_usd;
        }
        if (configData.ctx_fill_threshold_pct !== null && configData.ctx_fill_threshold_pct !== undefined) {
          ci.value = configData.ctx_fill_threshold_pct;
        }
      } catch (e) {
        console.warn('[cost] hydration failed:', e.message);
      }
    }

    // Handle live cost_update SSE events
    function handleCostUpdate(msg) {
      // msg shape: { type, sessionId, cost, tokens, contextFillPct, model, ts }
      const idx = costState.sessions.findIndex(s => s.session_id === msg.sessionId);
      const updated = {
        session_id:        msg.sessionId,
        model:             msg.model,
        input_tokens:      msg.tokens.input,
        output_tokens:     msg.tokens.output,
        cache_read_tokens: msg.tokens.cacheRead,
        cache_write_5m:    msg.tokens.cacheWrite,
        cache_write_1h:    0,
        total_cost_usd:    msg.cost,
        last_event_ts:     new Date(msg.ts).toISOString(),
      };
      if (idx >= 0) {
        costState.sessions[idx] = updated;
      } else {
        costState.sessions.unshift(updated); // prepend — most recent first
      }
      costState.contextFillPct = msg.contextFillPct;
      renderCostPanel();
    }

    // Wire threshold inputs: POST to /api/config on change (debounced 600ms)
    function wireThresholdInputs() {
      let debounceTimer;
      function saveThresholds() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
          const bi = document.getElementById('budget-input');
          const ci = document.getElementById('ctx-threshold-input');
          const body = {
            budget_threshold_usd:   bi.value ? parseFloat(bi.value)   : null,
            ctx_fill_threshold_pct: ci.value ? parseInt(ci.value, 10) : null,
          };
          costState.thresholds = {
            budget_threshold_usd:   body.budget_threshold_usd,
            ctx_fill_threshold_pct: body.ctx_fill_threshold_pct,
          };
          try {
            await fetch('/api/config', {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(body),
            });
          } catch (e) {
            console.warn('[cost] config save failed:', e.message);
          }
          renderAlertBanner(getActiveSession(costState.sessions));
        }, 600);
      }
      document.getElementById('budget-input').addEventListener('input', saveThresholds);
      document.getElementById('ctx-threshold-input').addEventListener('input', saveThresholds);
    }

    // Cost panel initialization
    document.addEventListener('DOMContentLoaded', () => {
      hydrateCost();
      wireThresholdInputs();
    });

    // ── Agent Tree ──────────────────────────────────────────────────────────
    // Stuck threshold: 60s default, overridable via ?stuck_threshold=N URL param
    const STUCK_THRESHOLD_MS = (() => {
      const p = new URLSearchParams(window.location.search);
      return (parseInt(p.get('stuck_threshold') || '60', 10)) * 1000;
    })();

    // In-memory tree state
    const agentTree = {
      sessions: new Map(), // session_id -> { sessionId, children: [agentId,...], cost: 0, tokens: 0 }
      agents:   new Map(), // agent_id   -> { agentId, parentSessionId, agentType, state, lastActivityTs, cost, tokens }
    };

    // Currently selected agent row (session_id for filtering)
    let activeSessionFilter = null;

    // ── Formatters ──────────────────────────────────────────────────────────

    function formatTokensCompact(n) {
      n = n || 0;
      if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
      if (n >= 1_000)     return (n / 1_000).toFixed(1) + 'k';
      return String(n);
    }

    function formatAgentCost(tokens, costUsd) {
      return `${formatTokensCompact(tokens)} / $${Number(costUsd || 0).toFixed(2)}`;
    }

    function formatIdle(ms) {
      const s = Math.floor(ms / 1000);
      const m = Math.floor(s / 60);
      const rem = s % 60;
      return m > 0 ? `idle ${m}m ${rem}s` : `idle ${s}s`;
    }

    // ── State mutations ──────────────────────────────────────────────────────

    function ensureSession(sessionId) {
      if (!agentTree.sessions.has(sessionId)) {
        agentTree.sessions.set(sessionId, { sessionId, children: [], cost: 0, tokens: 0 });
      }
      return agentTree.sessions.get(sessionId);
    }

    function addAgent({ agentId, agentType, parentSessionId, ts, highlight = false }) {
      const session = ensureSession(parentSessionId);
      if (!session.children.includes(agentId)) session.children.push(agentId);
      agentTree.agents.set(agentId, {
        agentId,
        parentSessionId,
        agentType: agentType || '',
        state: 'active',
        lastActivityTs: ts || Date.now(),
        cost: 0,
        tokens: 0,
        highlight,
      });
    }

    function updateAgentState(agentId, state, ts) {
      const agent = agentTree.agents.get(agentId);
      if (agent) {
        agent.state = state;
        agent.lastActivityTs = ts || Date.now();
      }
    }

    function updateAgentCost(agentId, cost, tokens) {
      const agent = agentTree.agents.get(agentId);
      if (agent) {
        agent.cost = cost || 0;
        agent.tokens = tokens || 0;
        // Update parent session rolled-up cost
        const session = agentTree.sessions.get(agent.parentSessionId);
        if (session) {
          let totalCost = 0;
          let totalTokens = 0;
          for (const childId of session.children) {
            const child = agentTree.agents.get(childId);
            if (child) { totalCost += child.cost; totalTokens += child.tokens; }
          }
          session.cost = totalCost;
          session.tokens = totalTokens;
        }
      }
    }

    // ── Rendering ────────────────────────────────────────────────────────────

    function findTopSpender() {
      let maxCost = -1;
      let topId = null;
      for (const [agentId, agent] of agentTree.agents) {
        if (agent.cost > maxCost) { maxCost = agent.cost; topId = agentId; }
      }
      return topId;
    }

    function createAgentRow({ label, cost, tokens, state, depth, agentId, sessionId, highlight }) {
      const row = document.createElement('div');
      row.className = `agent-row depth-${depth} state-${state}`;
      if (agentId)   row.dataset.agentId   = agentId;
      if (sessionId) row.dataset.sessionId = sessionId;
      if (highlight) {
        row.classList.add('just-spawned');
        // Remove class after animation completes (1.2s)
        setTimeout(() => row.classList.remove('just-spawned'), 1400);
      }

      // State indicator dot
      const indicator = document.createElement('span');
      indicator.className = 'agent-indicator';
      indicator.textContent = state === 'active' ? '\u25CF' : state === 'errored' ? '\u2715' : '\u25CB';

      // Label
      const labelEl = document.createElement('span');
      labelEl.className = 'agent-label';
      labelEl.textContent = label;

      // Cost (inline)
      const costEl = document.createElement('span');
      costEl.className = 'agent-cost';
      costEl.textContent = formatAgentCost(tokens, cost);

      // Idle time (shown only when stuck)
      const idleEl = document.createElement('span');
      idleEl.className = 'agent-idle';
      idleEl.style.display = 'none';

      row.appendChild(indicator);
      row.appendChild(labelEl);
      row.appendChild(costEl);
      row.appendChild(idleEl);

      // Click handler: toggle session filter
      row.addEventListener('click', () => {
        const targetSession = sessionId || (agentId ? agentTree.agents.get(agentId)?.parentSessionId : null);
        if (!targetSession) return;
        if (activeSessionFilter === targetSession) {
          activeSessionFilter = null;
        } else {
          activeSessionFilter = targetSession;
        }
        filterLog(activeSessionFilter);
        renderAgentTree(); // re-render to update selected class
      });

      return row;
    }

    function renderAgentTree() {
      const container = document.getElementById('agent-tree-body');
      container.innerHTML = '';

      const topSpenderId = findTopSpender();

      for (const [sessionId, session] of agentTree.sessions) {
        // Parent session row (depth 0)
        const parentRow = createAgentRow({
          label:     sessionId.slice(0, 8),
          cost:      session.cost,
          tokens:    session.tokens,
          state:     'active',
          depth:     0,
          sessionId: sessionId,
        });
        if (activeSessionFilter === sessionId) parentRow.classList.add('selected');
        container.appendChild(parentRow);

        // Child rows (depth 1)
        for (const agentId of session.children) {
          const agent = agentTree.agents.get(agentId);
          if (!agent) continue;
          const isTopSpender = agentId === topSpenderId && agent.cost > 0;
          const childRow = createAgentRow({
            label:   agent.agentType || agentId.slice(0, 8),
            cost:    agent.cost,
            tokens:  agent.tokens,
            state:   agent.state,
            depth:   1,
            agentId: agentId,
            highlight: agent.highlight,
          });
          if (isTopSpender) childRow.classList.add('top-spender');
          if (activeSessionFilter === agent.parentSessionId) childRow.classList.add('selected');
          agent.highlight = false; // clear after first render
          container.appendChild(childRow);
        }
      }
    }

    // ── Log Filter ────────────────────────────────────────────────────────────

    function filterLog(sessionId) {
      const badge = document.getElementById('log-filter-badge');
      // Show or hide all agent-section details elements
      document.querySelectorAll('.agent-section').forEach(details => {
        const sid = details.dataset.sessionId;
        details.style.display = (!sessionId || sid === sessionId) ? '' : 'none';
      });
      if (sessionId) {
        badge.textContent = `filtered: ${sessionId.slice(0, 8)}`;
        badge.style.display = 'inline';
      } else {
        badge.style.display = 'none';
      }
    }

    // ── Stuck Detection ───────────────────────────────────────────────────────

    setInterval(() => {
      const now = Date.now();
      for (const [agentId, agent] of agentTree.agents) {
        if (agent.state !== 'active') continue;
        const idle = now - agent.lastActivityTs;
        const row = document.querySelector(`[data-agent-id="${agentId}"]`);
        if (!row) continue;
        const idleEl = row.querySelector('.agent-idle');
        if (idle >= STUCK_THRESHOLD_MS) {
          row.classList.add('stuck');
          if (idleEl) { idleEl.textContent = formatIdle(idle); idleEl.style.display = ''; }
        } else {
          row.classList.remove('stuck');
          if (idleEl) idleEl.style.display = 'none';
        }
      }
    }, 5_000);

    // ── SSE event handlers ────────────────────────────────────────────────────

    function handleAgentSpawn(msg) {
      addAgent({ agentId: msg.agentId, agentType: msg.agentType, parentSessionId: msg.parentSessionId, ts: msg.ts, highlight: true });
      renderAgentTree();
    }

    function handleAgentUpdate(msg) {
      updateAgentState(msg.agentId, msg.state, msg.ts);
      renderAgentTree();
    }

    // Update lastActivityTs on every PreToolUse event (clears stuck state on next interval tick)
    // Patch the existing appendRow to also update lastActivityTs for agents in the same session
    const _origAppendRow = appendRow;
    window.appendRow = function(event) {
      if (event.hook_type === 'PreToolUse') {
        // Update lastActivityTs for all active agents in this session
        for (const [agentId, agent] of agentTree.agents) {
          if (agent.parentSessionId === event.session_id && agent.state === 'active') {
            agent.lastActivityTs = event.timestamp || Date.now();
          }
        }
      }
      _origAppendRow(event);
    };

    // ── Hydration ─────────────────────────────────────────────────────────────

    async function hydrateAgentTree() {
      try {
        const agents = await fetch('/api/agents').then(r => r.json());
        for (const a of agents) {
          addAgent({
            agentId:         a.agent_id,
            agentType:       a.agent_type,
            parentSessionId: a.parent_session_id,
            ts:              a.last_activity_ts,
            highlight:       false,
          });
          if (a.state !== 'active') updateAgentState(a.agent_id, a.state, a.last_activity_ts);
        }
        renderAgentTree();
      } catch (e) {
        console.warn('[agents] hydration failed:', e.message);
      }
    }

    // ── Wire into SSE subscription ─────────────────────────────────────────────
    // A second EventSource connects to /events to handle agent_spawn, agent_update,
    // and per-agent cost_update events without interfering with the existing SSE handler.

    document.addEventListener('DOMContentLoaded', async () => {
      await hydrateAgentTree();

      if (!IS_REPLAY) {
        const agentEs = new EventSource('/events');
        agentEs.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'agent_spawn')  { handleAgentSpawn(msg);  return; }
          if (msg.type === 'agent_update') { handleAgentUpdate(msg); return; }
          if (msg.type === 'cost_update' && msg.agentId) {
            // Per-agent cost update — attribute to individual agent
            const totalTokens = (msg.tokens.input || 0) + (msg.tokens.output || 0) +
                                (msg.tokens.cacheRead || 0) + (msg.tokens.cacheWrite || 0);
            updateAgentCost(msg.agentId, msg.cost, totalTokens);
            renderAgentTree();
          }
          // All other event types handled by existing EventSource — no double-rendering
        };
        agentEs.onerror = () => console.warn('[agents-sse] reconnecting...');
      }
    });

    // ── Timeline: Tool color map ───────────────────────────────────
    const TOOL_COLORS = {
      Read:       '#388bfd',
      Write:      '#e3672a',
      Edit:       '#e3672a',
      Bash:       '#a371f7',
      WebFetch:   '#2aa198',
      WebSearch:  '#2aa198',
      Task:       '#6e7fd2',
    };
    const TOOL_COLOR_DEFAULT = '#484f58';

    function getToolColor(toolName) {
      for (const [key, color] of Object.entries(TOOL_COLORS)) {
        if (toolName.toLowerCase().includes(key.toLowerCase())) return color;
      }
      return TOOL_COLOR_DEFAULT;
    }

    function formatRelativeTime(ms) {
      const s = Math.floor(ms / 1000);
      if (s < 60) return '+' + s + 's';
      const m = Math.floor(s / 60);
      const r = s % 60;
      return r > 0 ? '+' + m + 'm ' + r + 's' : '+' + m + 'm';
    }

    function formatUptime(sec) {
      const s = Math.floor(sec);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const r = s % 60;
      if (h > 0) return h + 'h ' + String(m).padStart(2, '0') + 'm';
      return m + 'm ' + String(r).padStart(2, '0') + 's';
    }

    // ── Timeline: State ───────────────────────────────────────────
    const timelineState = {
      agentRows:       new Map(), // session_id -> { label, bars: [], toolCount }
      // bars: [{ toolName, toolCallId, startMs, endMs, isInProgress, isError, target }]
      sessionStart:    null,
      latestTs:        0,
      inProgressCount: 0,
      hitBoxes:        [], // populated during render: [{ x0, y0, x1, y1, bar }]
    };

    function resetTimelineState() {
      timelineState.agentRows.clear();
      timelineState.sessionStart    = null;
      timelineState.latestTs        = 0;
      timelineState.inProgressCount = 0;
      timelineState.hitBoxes        = [];
    }

    function timelineAddPreToolUse(ev) {
      // ev: { tool_name, session_id, tool_call_id, timestamp, tool_input }
      if (!timelineState.agentRows.has(ev.session_id)) {
        // label: last 8 chars of session_id or 'parent'
        const label = ev.session_id ? ev.session_id.slice(-8) : 'parent';
        timelineState.agentRows.set(ev.session_id, { label, bars: [], toolCount: 0 });
      }
      const row = timelineState.agentRows.get(ev.session_id);
      const startMs = Number(ev.timestamp);
      if (timelineState.sessionStart === null || startMs < timelineState.sessionStart) {
        timelineState.sessionStart = startMs;
      }
      row.bars.push({
        toolName:     ev.tool_name,
        toolCallId:   ev.tool_call_id,
        startMs,
        endMs:        null, // filled on PostToolUse
        isInProgress: true,
        isError:      false,
        target:       ev.tool_input ? String(ev.tool_input).slice(0, 120) : '',
      });
      row.toolCount++;
      timelineState.inProgressCount++;
    }

    function timelineAddPostToolUse(ev) {
      // ev: { tool_name, session_id, tool_call_id, timestamp, duration_ms, exit_status }
      if (!timelineState.agentRows.has(ev.session_id)) return;
      const row = timelineState.agentRows.get(ev.session_id);
      const bar = row.bars.find(b => b.toolCallId === ev.tool_call_id && b.isInProgress);
      if (bar) {
        bar.endMs        = Number(ev.timestamp);
        bar.isInProgress = false;
        bar.isError      = ev.exit_status !== null && ev.exit_status !== undefined && ev.exit_status !== 0;
        if (timelineState.inProgressCount > 0) timelineState.inProgressCount--;
        timelineState.latestTs = Math.max(timelineState.latestTs, bar.endMs);
      }
    }

    // ── Timeline: Render ──────────────────────────────────────────
    const timelineCanvas  = document.getElementById('timeline-canvas');
    const timelineCtx     = timelineCanvas.getContext('2d');

    function resizeCanvas() {
      const container = document.getElementById('tab-body-timeline');
      const w = container.clientWidth;
      const h = container.clientHeight;
      if (w === 0 || h === 0) return;
      const dpr = window.devicePixelRatio || 1;
      timelineCanvas.width  = w * dpr;
      timelineCanvas.height = h * dpr;
      timelineCanvas.style.width  = w + 'px';
      timelineCanvas.style.height = h + 'px';
      timelineCtx.scale(dpr, dpr);
    }

    function renderTimeline() {
      const dpr = window.devicePixelRatio || 1;
      const W   = timelineCanvas.width  / dpr;
      const H   = timelineCanvas.height / dpr;

      timelineCtx.clearRect(0, 0, W, H);
      timelineState.hitBoxes = [];

      if (timelineState.agentRows.size === 0 || timelineState.sessionStart === null) {
        timelineCtx.fillStyle = '#8b949e';
        timelineCtx.font = '13px sans-serif';
        timelineCtx.textAlign = 'center';
        timelineCtx.fillText('No active session. Start using Claude Code to see activity.', W / 2, H / 2);
        return;
      }

      const now          = Date.now();
      const sessionStart = timelineState.sessionStart;
      const sessionEnd   = Math.max(now, timelineState.latestTs, sessionStart + 1000);
      const totalMs      = sessionEnd - sessionStart;

      const HEADER_H  = 24;
      const ROW_H     = 28;
      const BAR_H     = 18;
      const BAR_MARGIN= (ROW_H - BAR_H) / 2;
      const LABEL_W   = 80;

      // Sort rows by toolCount descending
      const rowOrder = [...timelineState.agentRows.entries()]
        .sort((a, b) => b[1].toolCount - a[1].toolCount)
        .map(([sessionId]) => sessionId);

      // Time axis
      const tickCount = 5;
      timelineCtx.fillStyle = '#8b949e';
      timelineCtx.font = '10px monospace';
      timelineCtx.textAlign = 'left';
      for (let i = 0; i <= tickCount; i++) {
        const frac  = i / tickCount;
        const xPx   = LABEL_W + frac * (W - LABEL_W);
        const label = formatRelativeTime(frac * totalMs);
        // Align last tick label so it doesn't overflow
        if (i === tickCount) timelineCtx.textAlign = 'right';
        timelineCtx.fillText(label, xPx, HEADER_H - 6);
        timelineCtx.textAlign = 'left';
        // Tick mark
        timelineCtx.fillStyle = '#30363d';
        timelineCtx.fillRect(xPx, HEADER_H - 4, 1, H - HEADER_H);
        timelineCtx.fillStyle = '#8b949e';
      }

      // Swimlane rows
      rowOrder.forEach((sessionId, rowIdx) => {
        const y       = HEADER_H + rowIdx * ROW_H;
        const rowData = timelineState.agentRows.get(sessionId);

        // Row background
        timelineCtx.fillStyle = rowIdx % 2 === 0 ? '#161b22' : '#0d1117';
        timelineCtx.fillRect(0, y, W, ROW_H);

        // Agent label (truncated)
        timelineCtx.fillStyle = '#8b949e';
        timelineCtx.font = '10px monospace';
        timelineCtx.textAlign = 'left';
        timelineCtx.save();
        timelineCtx.beginPath();
        timelineCtx.rect(2, y, LABEL_W - 4, ROW_H);
        timelineCtx.clip();
        timelineCtx.fillText(rowData.label, 2, y + ROW_H / 2 + 4);
        timelineCtx.restore();

        // Bars
        for (const bar of rowData.bars) {
          const endMs = bar.isInProgress ? now : bar.endMs;
          const x0 = LABEL_W + ((bar.startMs - sessionStart) / totalMs) * (W - LABEL_W);
          const x1 = LABEL_W + ((endMs      - sessionStart) / totalMs) * (W - LABEL_W);
          const barW = Math.max(x1 - x0, 2);

          // Color
          if (bar.isError) {
            timelineCtx.fillStyle = '#f85149';
            timelineCtx.globalAlpha = 1.0;
          } else if (bar.isInProgress) {
            const phase = (Date.now() % 1200) / 1200;
            const alpha = 0.55 + 0.45 * Math.abs(Math.sin(phase * Math.PI));
            timelineCtx.globalAlpha = alpha;
            timelineCtx.fillStyle = getToolColor(bar.toolName);
          } else {
            timelineCtx.fillStyle = getToolColor(bar.toolName);
            timelineCtx.globalAlpha = 1.0;
          }
          timelineCtx.fillRect(x0, y + BAR_MARGIN, barW, BAR_H);
          timelineCtx.globalAlpha = 1.0;

          // Bar label (only if wide enough)
          if (barW > 30) {
            timelineCtx.fillStyle = '#fff';
            timelineCtx.font = '10px monospace';
            timelineCtx.textAlign = 'left';
            timelineCtx.save();
            timelineCtx.beginPath();
            timelineCtx.rect(x0 + 2, y + BAR_MARGIN, barW - 4, BAR_H);
            timelineCtx.clip();
            timelineCtx.fillText(bar.toolName, x0 + 4, y + BAR_MARGIN + BAR_H - 5);
            timelineCtx.restore();
          }

          // Store hit box for tooltip
          timelineState.hitBoxes.push({ x0, y0: y + BAR_MARGIN, x1: x0 + barW, y1: y + BAR_MARGIN + BAR_H, bar });
        }
      });
    }

    // ── Timeline: Animation loop ──────────────────────────────────
    let _tlAnimId = null;

    function startTimelineLoop() {
      if (_tlAnimId !== null) return;
      function loop() {
        renderTimeline();
        if (timelineState.inProgressCount > 0) {
          _tlAnimId = requestAnimationFrame(loop);
        } else {
          _tlAnimId = null;
        }
      }
      _tlAnimId = requestAnimationFrame(loop);
    }

    function stopTimelineLoop() {
      if (_tlAnimId !== null) { cancelAnimationFrame(_tlAnimId); _tlAnimId = null; }
    }

    // ResizeObserver for responsive canvas
    const _tlRO = new ResizeObserver(entries => {
      for (const e of entries) {
        if (e.contentRect.width === 0 || e.contentRect.height === 0) continue;
        resizeCanvas();
        renderTimeline();
      }
    });
    _tlRO.observe(document.getElementById('tab-body-timeline'));

    // ── Timeline: Tab switching ───────────────────────────────────
    function switchTab(which) {
      const toolLog = document.getElementById('tool-log');
      const tlBody  = document.getElementById('tab-body-timeline');
      const btnLog  = document.getElementById('tab-log');
      const btnTL   = document.getElementById('tab-timeline');

      if (which === 'log') {
        toolLog.style.display  = '';
        tlBody.style.display   = 'none';
        btnLog.classList.add('active');
        btnTL.classList.remove('active');
        stopTimelineLoop();
      } else {
        toolLog.style.display  = 'none';
        tlBody.style.display   = 'flex';  // flex so the div fills panel-log
        btnLog.classList.remove('active');
        btnTL.classList.add('active');
        // Canvas needs dimensions after becoming visible
        setTimeout(() => {
          resizeCanvas();
          renderTimeline();
          if (timelineState.inProgressCount > 0) startTimelineLoop();
        }, 0);
      }
    }

    document.getElementById('tab-log').addEventListener('click', () => switchTab('log'));
    document.getElementById('tab-timeline').addEventListener('click', () => switchTab('timeline'));

    // ── Timeline: Tooltip ─────────────────────────────────────────
    const _tlTip = document.getElementById('timeline-tooltip');

    function showTimelineTip(clientX, clientY, bar) {
      _tlTip.style.display = 'block';
      _tlTip.style.left    = (clientX + 12) + 'px';
      _tlTip.style.top     = (clientY + 8)  + 'px';
      const status = bar.isError ? 'error' : bar.isInProgress ? 'in-progress' : 'success';
      const dur = bar.endMs ? formatDuration(bar.endMs - bar.startMs) : '...';
      document.getElementById('tip-tool').textContent   = bar.toolName;
      document.getElementById('tip-target').textContent = (bar.target || '').slice(0, 60) || '\u2014';
      document.getElementById('tip-dur').textContent    = dur;
      const tipStatus = document.getElementById('tip-status');
      tipStatus.textContent  = status;
      tipStatus.className    = 'tip-' + status;
    }

    function hideTimelineTip() {
      _tlTip.style.display = 'none';
    }

    timelineCanvas.addEventListener('mousemove', (e) => {
      const rect = timelineCanvas.getBoundingClientRect();
      const mx   = e.clientX - rect.left;
      const my   = e.clientY - rect.top;
      const hit  = timelineState.hitBoxes.find(h => mx >= h.x0 && mx <= h.x1 && my >= h.y0 && my <= h.y1);
      if (hit) {
        showTimelineTip(e.clientX, e.clientY, hit.bar);
        timelineCanvas.style.cursor = 'crosshair';
      } else {
        hideTimelineTip();
        timelineCanvas.style.cursor = 'default';
      }
    });
    timelineCanvas.addEventListener('mouseleave', hideTimelineTip);

    // ── Health Panel ──────────────────────────────────────────────
    function updateHealthPanel(h) {
      // Hook status
      const hookCard  = document.getElementById('hcard-hook');
      const hookVal   = document.getElementById('hcard-hook-value');
      const ACTIVE_THRESH_MS = 60 * 1000;
      const isActive  = h.lastEventTs && (Date.now() - h.lastEventTs) < ACTIVE_THRESH_MS;
      hookVal.textContent = isActive ? 'Active' : 'Inactive';
      hookCard.className  = 'health-card ' + (isActive ? 'status-green' : 'status-red');

      // Error rate
      const errCard   = document.getElementById('hcard-error');
      const errVal    = document.getElementById('hcard-error-value');
      const rate      = h.errorRate || 0;
      errVal.textContent  = rate.toFixed(1) + '%';
      const errClass  = rate >= 20 ? 'status-red' : rate >= 5 ? 'status-yellow' : 'status-green';
      errCard.className   = 'health-card ' + errClass;

      // Uptime
      const uptCard   = document.getElementById('hcard-uptime');
      const uptVal    = document.getElementById('hcard-uptime-value');
      uptVal.textContent  = formatUptime(h.serverUptimeS || 0);
      uptCard.className   = 'health-card status-green';
    }

    // Initial fetch + 5s polling
    async function pollHealth() {
      try {
        const h = await fetch('/api/health').then(r => r.json());
        updateHealthPanel(h);
      } catch (e) { /* silent — server may be restarting */ }
    }
    pollHealth();
    setInterval(pollHealth, 5000);
  </script>
</body>
</html>
